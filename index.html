<!-- ⭐ 香港 7 日天氣預報 -->
<section style="margin-top:20px; padding:15px; background:rgba(255,255,255,0.8); width:90%; max-width:900px; margin-left:auto; margin-right:auto; border-radius:12px;">
  <h2 style="margin-bottom:10px;">🌤️ 香港 7 日天氣預報</h2>
  <div id="weather7days" style="text-align:left; font-size:1.1em; line-height:1.6;"></div>
</section>

<script>
  async function loadWeather() {
    try {
      const res = await fetch("https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc");
      const data = await res.json();
      let html = "";
      const days = data.weatherForecast.slice(0, 7);

      days.forEach(d => {
        html += `
          <div>
            📅 <b>${d.forecastDate.substring(4,6)}月${d.forecastDate.substring(6,8)}日</b>
            — ${d.forecastWeather}
            🌡️ ${d.forecastMintemp.value}°C ~ ${d.forecastMaxtemp.value}°C
          </div>
        `;
      });

      document.getElementById("weather7days").innerHTML = html;
    } catch (e) {
      document.getElementById("weather7days").innerHTML = "⚠️ 天氣資料暫時無法取得";
    }
  }
  loadWeather();
</script>

<!-- ⭐ 分店查詢 -->
<section style="margin-top:40px;">
  <h2 class="section-title">選擇分店代號查詢資料</h2>
  <br><br>

  <select id="storeCodeInput" style="padding:10px; width:60%; border-radius:8px;">
    <option value="">請選擇分店代號</option>
  </select>

  <div id="storeAddressResult" class="result-box">Address：—</div>

  <div id="storePhoneResult" class="result-box">電話：—</div>
</section>

<!-- ⭐ 載入獨立資料檔 -->
<script src="store-data.js"></script>

<script>
  const storeNameMap = {};
  const storeNameZhMap = {};
  const addressMap = {};
  const addressZhMap = {};
  const phoneMap = {};

  for (const code in storeData) {
    const s = storeData[code];
    storeNameMap[code] = s.nameEn;
    storeNameZhMap[code] = s.nameZh;   // ⭐ 新增中文名稱
    addressMap[code] = s.addressEn;
    addressZhMap[code] = s.addressZh;
    phoneMap[code] = s.phone;
  }

  window.onload = function () {
    const select = document.getElementById("storeCodeInput");
    const codes = Object.keys(storeNameZhMap).sort();

    codes.forEach(code => {
      const opt = document.createElement("option");

      // ⭐ 改成顯示中文名稱
      opt.value = code;
      opt.textContent = code + " — " + storeNameZhMap[code];

      select.appendChild(opt);
    });
  };

  document.getElementById("storeCodeInput").addEventListener("change", function () {
    const code = this.value;

    document.getElementById("storeAddressResult").textContent =
      "Address：" + (addressMap[code] || "—");

    document.getElementById("storeAddressZhResult").textContent =
      "中文地址：" + (addressZhMap[code] || "—");

    document.getElementById("storePhoneResult").textContent =
      "電話：" + (phoneMap[code] || "—");
  });
</script>

<!-- ⭐ QR Code 區塊 -->
<section style="margin-top:40px;">
  <h2 class="section-title">輸入網址轉換成 QR CODE</h2>
  <br><br>
  <input type="text" id="urlInput" placeholder="請輸入網址" style="padding:10px; width:60%; border-radius:8px;">
  <button onclick="generateQRCode()" style="padding:10px 20px; margin-left:10px; border-radius:8px; background-color:#4CAF50; color:white;">產生 QR Code</button>
  <div id="qrCode" style="margin-top:20px;"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
  function generateQRCode() {
    const url = document.getElementById('urlInput').value.trim();
    const qrContainer = document.getElementById('qrCode');
    qrContainer.innerHTML = '';

    if (url) {
      QRCode.toDataURL(url, function (err, src) {
        if (!err) {
          const img = document.createElement('img');
          img.src = src;
          img.style.maxWidth = '200px';
          img.style.border = '1px solid #ccc';
          img.style.padding = '10px';
          img.style.background = '#fff';
          qrContainer.appendChild(img);
        } else {
          qrContainer.textContent = '產生失敗，請確認網址格式';
        }
      });
    } else {
      qrContainer.textContent = '請先輸入網址';
    }
  }
</script>

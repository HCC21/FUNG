 // ⭐ 地址（示範，可自行補上）

   "CTS":"荃灣千色匯二期 3 樓",
   "HCC":"尖沙咀梳士巴利道 10 號",
   "KAT":"藍田啟田商場 1 樓",
   "KIM":"尖沙咀金巴利道 25 號",
   "LGN":"麗港城商場地下"
   // ⭐ 你可以在這裡加入所有分店地址
 };

 // ⭐ 電話（示範，可自行補上）
 const phoneMap = {
   "CTS":"1234 5678",
   "HCC":"2345 6789",
   "KAT":"3456 7890",
   "KIM":"4567 8901",
   "LGN":"5678 9012"
 };

 // ⭐ 自動載入下拉選單（英文字母排序）
 window.onload = function () {
   const select = document.getElementById('storeCodeInput');
   const sortedCodes = Object.keys(storeMap).sort();

   sortedCodes.forEach(code => {
     const option = document.createElement('option');
     option.value = code;
     option.textContent = code + " — " + storeMap[code];
     select.appendChild(option);
   });
 };

 // ⭐ 顯示地址 + 電話
 function lookupStoreInfo() {
   const code = document.getElementById('storeCodeInput').value;
   const addressBox = document.getElementById('storeAddressResult');
   const phoneBox = document.getElementById('storePhoneResult');

   if (!code) {
     addressBox.textContent = "地址：—";
     phoneBox.textContent = "電話：—";
     return;
   }

   addressBox.textContent = "地址：" + (addressMap[code] || "未提供");
   phoneBox.textContent = "電話：" + (phoneMap[code] || "未提供");
 }

 document.getElementById('storeCodeInput').addEventListener('change', lookupStoreInfo);
</script>

<!-- ⭐ QR Code 區塊 -->
<section style="margin-top:40px;">
  <h2 class="section-title">輸入網址轉換成 QR CODE</h2>
  <br><br>
  <input type="text" id="urlInput" placeholder="請輸入網址" style="padding:10px; width:60%; border-radius:8px;">
  <button onclick="generateQRCode()" style="padding:10px 20px; margin-left:10px; border-radius:8px; background-color:#4CAF50; color:white;">產生 QR Code</button>
  <div id="qrCode" style="margin-top:20px;"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
  function generateQRCode() {
    const url = document.getElementById('urlInput').value.trim();
    const qrContainer = document.getElementById('qrCode');
    qrContainer.innerHTML = '';
    if (url) {
      QRCode.toDataURL(url, function (err, src) {
        if (!err) {
          const img = document.createElement('img');
          img.src = src;
          img.style.maxWidth = '200px';
          img.style.border = '1px solid #ccc';
          img.style.padding = '10px';
          img.style.background = '#fff';
          qrContainer.appendChild(img);
        } else {
          qrContainer.textContent = '產生失敗，請確認網址格式';
        }
      });
    } else {
      qrContainer.textContent = '請先輸入網址';
    }
  }
</script>

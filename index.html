<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Cherry Area 每日通道</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Noto Serif TC', serif;
    text-align: center;
    background-image: url('coffee-bg.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: #2f2f2f;
  }
  h1 {
    background-color: rgba(255, 255, 255, 0.75);
    display: inline-block;
    padding: 10px 30px;
    border-radius: 12px;
    margin-top: 30px;
  }
  .link-button {
    margin: 15px;
    padding: 18px 24px;
    display: inline-block;
    background: rgba(76, 175, 80, 0.85);
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-size: 1.1em;
    transition: background 0.3s ease;
    backdrop-filter: blur(6px);
  }
  .link-button:hover {
    background: rgba(69, 160, 73, 0.95);
  }
  .section-title {
    background-color: rgba(255, 255, 255, 0.85);
    display: inline-block;
    padding: 8px 20px;
    border-radius: 10px;
  }
  .result-box {
    background-color: rgba(255, 255, 255, 0.85);
    display: block;
    padding: 12px 20px;
    border-radius: 10px;
    margin: 12px auto 0 auto;
    width: 60%;
    font-size: 1.1em;
    font-weight: bold;
    text-align: left;
  }
</style>
</head>

<body>

<!-- ⭐ 左上登入 -->
<div style="position: fixed; top: 20px; left: 20px; background: rgba(255,255,255,0.85); padding: 10px 15px; border-radius: 10px; box-shadow: 0 0 8px rgba(0,0,0,0.2); z-index: 999;">
  <input type="password" id="loginPassword" placeholder="管理員密碼" style="padding:5px; width:140px; border-radius:6px;">
  <button id="loginBtn" onclick="checkLogin()" style="padding:5px 10px; border-radius:6px; background:#4CAF50; color:white;">登入</button>
  <p id="loginMessage" style="color:red; font-weight:bold; margin:5px 0 0 0;"></p>
</div>

<!-- ⭐ 右上語言切換 -->
<div style="position: fixed; top: 20px; right: 20px; z-index: 999;">
  <button onclick="setLang('zh')" style="padding:5px 10px; border-radius:6px;">中文</button>
  <button onclick="setLang('en')" style="padding:5px 10px; border-radius:6px;">English</button>
</div>

<!-- ⭐ 背景音樂控制 -->
<div style="position: fixed; top: 100px; right: 20px; z-index: 999;
            background: rgba(255,255,255,0.85); padding:10px; border-radius:10px;
            box-shadow:0 0 6px rgba(0,0,0,0.2); width:150px;">
  <button onclick="toggleBGM()" 
          style="padding:5px 10px; width:100%; border-radius:6px; background:#ff9800; color:white;">
    🎵 播放 / 暫停
  </button>

  <div style="margin-top:10px; font-size:0.9em;">音量</div>
  <input type="range" min="0" max="1" step="0.01" value="0.5"
         id="bgmVolume" oninput="changeVolume(this.value)"
         style="width:100%;">
</div>

<h1 id="title">Cherry Area 每日通道</h1>
<p id="dateTime"></p>

<!-- ⭐ 天氣預報 -->
<section style="margin-top:20px; padding:10px; background:rgba(255,255,255,0.8); width:90%; max-width:900px; margin-left:auto; margin-right:auto; border-radius:12px;">
  <h2 id="weatherTitle" style="margin-bottom:10px; font-size:1.2em;">🌤️ 香港 7 日天氣預報</h2>
  <div id="weatherScroll" style="display:flex; overflow-x:auto; gap:10px; padding-bottom:10px; white-space:nowrap;"></div>
</section>

<script>
/* ⭐ 語言資料 */
const LANG = {
  zh: {
    title: "Cherry Area 每日通道",
    weatherTitle: "🌤️ 香港 7 日天氣預報",
    loginPlaceholder: "管理員密碼",
    loginBtn: "登入",
    loginError: "密碼錯誤",
    admin1: "🔒 2026 Revenue Data",
    admin2: "🔒 2025 Revenue Data",
    admin3: "🔒 每月上載更表",
    admin4: "🔒 每日時鐘",
    erp: "📦ERP系統",
    inv: "📦PCC Inventory系統(只用作Clockin/out)",
    gaia: "🕗 Gaia UI",
    form: "📄分店使用表格",
    storeTitle: "選擇分店代號查詢資料",
    address: "Address：",
    addressZh: "中文地址：",
    phone: "電話：",
    qrTitle: "輸入網址轉換成 QR CODE",
    qrBtn: "產生 QR Code",
    qrError: "請先輸入網址"
  },
  en: {
    title: "Cherry Area Daily Portal",
    weatherTitle: "🌤️ Hong Kong 7-Day Weather Forecast",
    loginPlaceholder: "Admin Password",
    loginBtn: "Login",
    loginError: "Incorrect password",
    admin1: "🔒 2026 Revenue Data",
    admin2: "🔒 2025 Revenue Data",
    admin3: "🔒 Monthly Roster Upload",
    admin4: "🔒 Daily Clock-in Sheet",
    erp: "📦 ERP System",
    inv: "📦 PCC Inventory System (Clock-in/out only)",
    gaia: "🕗 Gaia UI",
    form: "📄 Store Forms",
    storeTitle: "Select Store Code",
    address: "Address:",
    addressZh: "Chinese Address:",
    phone: "Phone:",
    qrTitle: "Convert URL to QR Code",
    qrBtn: "Generate QR Code",
    qrError: "Please enter a URL"
  }
};

let currentLang = "zh";

/* ⭐ 語言切換 */
function setLang(lang) {
  currentLang = lang;

  document.getElementById("title").textContent = LANG[lang].title;
  document.getElementById("weatherTitle").textContent = LANG[lang].weatherTitle;

  document.getElementById("loginPassword").placeholder = LANG[lang].loginPlaceholder;
  document.getElementById("loginBtn").textContent = LANG[lang].loginBtn;

  document.getElementById("admin1").textContent = LANG[lang].admin1;
  document.getElementById("admin2").textContent = LANG[lang].admin2;
  document.getElementById("admin3").textContent = LANG[lang].admin3;
  document.getElementById("admin4").textContent = LANG[lang].admin4;

  document.getElementById("erp").textContent = LANG[lang].erp;
  document.getElementById("inv").textContent = LANG[lang].inv;
  document.getElementById("gaia").textContent = LANG[lang].gaia;
  document.getElementById("form").textContent = LANG[lang].form;

  document.getElementById("storeTitle").textContent = LANG[lang].storeTitle;

  loadWeather();
}
</script>

<!-- ⭐ 登入後顯示連結 -->
<div id="adminLinks" style="display:none; margin-top:20px;">
  <a id="admin1" href="#" class="link-button">🔒 2026 Revenue Data</a>
  <a id="admin2" href="#" class="link-button">🔒 2025 Revenue Data</a>
  <a id="admin3" href="#" class="link-button">🔒 每月上載更表</a>
  <a id="admin4" href="#" class="link-button">🔒 每日時鐘</a>
</div>

<!-- ⭐ 其他連結 -->
<a id="erp" href="https://hkprodapp.pacificcoffee.com/dist/#/" class="link-button">📦ERP系統</a>
<a id="inv" href="https://pcc-inventory.web.app/auth" class="link-button">📦PCC Inventory系統(只用作Clockin/out)</a>
<a id="gaia" href="https://portal.gaiaworkforce.com/#/setting" class="link-button" target="_blank">🕗 Gaia UI</a>
<a id="form" href="https://drive.google.com/drive/folders/1yI6vbNPonKQSwrwM38v6Q1mRR5JkUyxJ?usp=drive_link" class="link-button">📄分店使用表格</a>

<script>
/* ⭐ 登入功能 */
function checkLogin() {
  const input = document.getElementById("loginPassword").value;
  const correct = "cherry2026";

  if (input === correct) {
    document.getElementById("adminLinks").style.display = "block";
    document.getElementById("loginMessage").textContent = "";
  } else {
    document.getElementById("loginMessage").textContent = LANG[currentLang].loginError;
  }
}

/* ⭐ 時鐘 */
setInterval(() => {
  const now = new Date();
  document.getElementById('dateTime').textContent = now.toLocaleString();
}, 1000);
</script>

<!-- ⭐ 分店查詢 -->
<section style="margin-top:40px;">
  <h2 id="storeTitle" class="section-title">選擇分店代號查詢資料</h2>
  <br><br>

  <select id="storeCodeInput" style="padding:10px; width:60%; border-radius:8px;">
    <option value="">請選擇分店代號</option>
  </select>

  <div id="storeAddressResult" class="result-box">Address：—</div>
  <div id="storeAddressZhResult" class="result-box">中文地址：—</div>
  <div id="storePhoneResult" class="result-box">電話：—</div>
</section>

<script src="store-data.js"></script>

<script>
/* ⭐ 分店資料 */
const storeNameMap = {};
const storeNameZhMap = {};
const addressMap = {};
const addressZhMap = {};
const phoneMap = {};

for (const code in storeData) {
  const s = storeData[code];
  storeNameMap[code] = s.nameEn;
  storeNameZhMap[code] = s.nameZh;
  addressMap[code] = s.addressEn;
  addressZhMap[code] = s.addressZh;
  phoneMap[code] = s.phone;
}

window.onload = function () {
  const select = document.getElementById("storeCodeInput");
  const codes = Object.keys(storeNameZhMap).sort();

  codes.forEach(code => {
    const opt = document.createElement("option");
    opt.value = code;
    opt.textContent = code + " — " + storeNameZhMap[code];
    select.appendChild(opt);
  });
};

document.getElementById("storeCodeInput").addEventListener("change", function () {
  const code = this.value;

  document.getElementById("storeAddressResult").textContent =
    LANG[currentLang].address + (addressMap[code] || "—");

  document.getElementById("storeAddressZhResult").textContent =
    LANG[currentLang].addressZh + (addressZhMap[code] || "—");

  document.getElementById("storePhoneResult").textContent =
    LANG[currentLang].phone + (phoneMap[code] || "—");
});
</script>

<!-- ⭐ QR Code -->
<section style="margin-top:40px;">
  <h2 id="qrTitle" class="section-title">輸入網址轉換成 QR CODE</h2>
  <br><br>
  <input type="text" id="urlInput" placeholder="請輸入網址" style="padding:10px; width:60%; border-radius:8px;">
  <button id="qrBtn" onclick="generateQRCode()" style="padding:10px 20px; margin-left:10px; border-radius:8px; background-color:#4CAF50; color:white;">產生 QR Code</button>
  <div id="qrCode" style="margin-top:20px;"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
function generateQRCode() {
  const url = document.getElementById('urlInput').value.trim();
  const qrContainer = document.getElementById('qrCode');
  qrContainer.innerHTML = '';

  if (url) {
    QRCode.toDataURL(url, function (err, src) {
      if (!err) {
        const img = document.createElement('img');
        img.src = src;
        img.style.maxWidth = '200px';
        img.style.border = '1px solid #ccc';
        img.style.padding = '10px';
        img.style.background = '#fff';
        qrContainer.appendChild(img);
      } else {
        qrContainer.textContent = '產生失敗，請確認網址格式';
      }
    });
  } else {
    qrContainer.textContent = LANG[currentLang].qrError;
  }
}
</script>

<!-- ⭐ 天氣預報（不自動滑動 + 文字不出界） -->
<script>
async function loadWeather() {
  try {
    const apiLang = currentLang === "zh" ? "tc" : "en";
    const res = await fetch(`https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=${apiLang}`);
    const data = await res.json();
    const days = data.weatherForecast.slice(0, 7);

    let html = "";

    days.forEach(d => {
      const w = d.forecastWeather;

      let icon = "⛅";
      if (w.includes("晴") || w.includes("Fine")) icon = "☀️";
      if (w.includes("雨") || w.includes("Rain")) icon = "🌧️";
      if (w.includes("雷") || w.includes("Thunder")) icon = "⛈️";
      if (w.includes("陰") || w.includes("Cloudy")) icon = "☁️";

      let bg = "linear-gradient(135deg, #f0f0f0, #dcdcdc)";
      if (icon === "☀️") bg = "linear-gradient(135deg, #ffe08a, #ffcf40)";
      if (icon === "🌧️" || icon === "⛈️") bg = "linear-gradient(135deg, #8ec5fc, #6ea8ff)";

      html += `
        <div style="
          min-width:140px;
          background:${bg};
          padding:12px;
          border-radius:12px;
          box-shadow:0 0 6px rgba(0,0,0,0.15);
          font-size:0.9em;
          text-align:left;
          color:#333;
          white-space: normal;
          word-break: break-word;
        ">
          <div style="font-size:1.4em;">${icon}</div>
          <b>${d.forecastDate.substring(4,6)}月${d.forecastDate.substring(6,8)}日</b><br>
          ${w}<br>
          🌡️ ${d.forecastMintemp.value}°C - ${d.forecastMaxtemp.value}°C
        </div>
      `;
    });

    document.getElementById("weatherScroll").innerHTML = html;

  } catch (e) {
    document.getElementById("weatherScroll").innerHTML = "⚠️ 無法取得天氣資料";
  }
}

loadWeather();
</script>

<!-- ⭐ 背景音樂播放器 -->
<audio id="bgm" src="bgm.mp3" loop></audio>

<script>
let bgmPlaying = false;

function toggleBGM() {
  const bgm = document.getElementById("bgm");

  if (!bgmPlaying) {
    bgm.play();
    bgmPlaying = true;
  } else {
    bgm.pause();
    bgmPlaying = false;
  }
}

function changeVolume(v) {
  const bgm = document.getElementById("bgm");
  bgm.volume = v;
}
</script>

</body>
</html>
